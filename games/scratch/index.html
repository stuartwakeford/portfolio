<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Team Draw</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0c10;
      --surface: #13161d;
      --surface2: #1c2030;
      --accent: #f0c040;
      --accent2: #e84c4c;
      --text: #f0f2f8;
      --muted: #7a8299;
      --border: rgba(255,255,255,0.07);
      --spin-duration: 0.55s;
      --stagger: 0.22s;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(240,192,64,0.10) 0%, transparent 70%),
        repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.025) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.025) 40px);
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.8rem, 6vw, 5rem);
      letter-spacing: 0.04em;
      line-height: 1;
      color: var(--text);
    }

    header h1 span {
      color: var(--accent);
    }

    header p {
      margin-top: 10px;
      font-size: 0.9rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      width: 100%;
      max-width: 960px;
    }

    /* ── Tile Shell ── */
    .tile {
      perspective: 900px;
      height: 260px;
      cursor: default;
    }

    .tile-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transform: rotateY(180deg);   /* start showing back face */
      transition: transform var(--spin-duration) cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Spin-in state: tile flips to 0deg (front face visible) */
    .tile-inner.revealed {
      transform: rotateY(0deg);
    }

    /* shared face styles */
    .tile-front,
    .tile-back {
      position: absolute;
      inset: 0;
      border-radius: 16px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    /* ── Back face (spinner placeholder) ── */
    .tile-back {
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      transform: rotateY(180deg);
    }

    .spinner-ring {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(240,192,64,0.15);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Front face (team card) ── */
    .tile-front {
      background: var(--surface);
      border: 1px solid var(--border);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Top coloured stripe */
    .tile-front::before {
      content: '';
      display: block;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      flex-shrink: 0;
    }

    .tile-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 16px 16px;
      gap: 10px;
      position: relative;
    }

    .team-badge {
      width: 72px;
      height: 72px;
      object-fit: contain;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
      transition: transform 0.3s ease;
    }

    .tile:hover .team-badge {
      transform: scale(1.08) translateY(-2px);
    }

    .team-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.35rem;
      letter-spacing: 0.05em;
      color: var(--text);
      text-align: center;
      line-height: 1.1;
    }

    .vs-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .vs-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.1em;
    }

    .tile-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: var(--surface2);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .points-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    .points-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      color: var(--accent);
      letter-spacing: 0.05em;
    }

    /* Hover glow */
    .tile:hover .tile-front {
      border-color: rgba(240,192,64,0.3);
      box-shadow: 0 0 24px rgba(240,192,64,0.08), 0 8px 32px rgba(0,0,0,0.4);
    }

    /* error state */
    .error-msg {
      color: var(--accent2);
      text-align: center;
      font-size: 0.85rem;
      padding: 12px;
    }

    /* ── Responsive ── */
    @media (max-width: 680px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .tile { height: 240px; }
    }

    @media (max-width: 420px) {
      .grid {
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .tile { height: 220px; }
      .team-badge { width: 56px; height: 56px; }
    }
  </style>
</head>
<body>

  <header>
    <h1>The <span>Draw</span></h1>
    <p>Six teams selected at random</p>
  </header>

  <div class="grid" id="grid"></div>

  <script>
    // ── Parse CSV (handles quoted fields, Windows line endings) ──
    function parseCSV(text) {
      const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').trim().split('\n');
      const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
      return lines.slice(1).map(line => {
        const cols = line.split(',').map(c => c.trim().replace(/^"|"$/g, ''));
        const obj = {};
        headers.forEach((h, i) => obj[h] = cols[i] ?? '');
        return obj;
      }).filter(r => r['Team-name']);
    }

    // ── Pick 6 unique random rows ──
    function pickRandom(arr, n) {
      const shuffled = [...arr].sort(() => Math.random() - 0.5);
      return shuffled.slice(0, n);
    }

    // ── Build a tile element ──
    function buildTile(team) {
      const tile = document.createElement('div');
      tile.className = 'tile';

      tile.innerHTML = `
        <div class="tile-inner" id="ti-${Math.random().toString(36).slice(2)}">
          <div class="tile-back">
            <div class="spinner-ring"></div>
          </div>
          <div class="tile-front">
            <div class="tile-body">
              <img class="team-badge"
                   src="${team['Team-image-path']}"
                   alt="${team['Team-name']}"
                   onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 60 60%22><circle cx=%2230%22 cy=%2230%22 r=%2228%22 fill=%22%231c2030%22 stroke=%22%23f0c040%22 stroke-width=%222%22/><text x=%2230%22 y=%2236%22 text-anchor=%22middle%22 fill=%22%23f0c040%22 font-size=%2220%22 font-family=%22sans-serif%22>${team['Team-name'].charAt(0)}</text></svg>'" />
              <div class="team-name">${team['Team-name']}</div>
              <div class="vs-row">
                <span class="vs-badge">VS</span>
                <span>${team['Opponent-name']}</span>
              </div>
            </div>
            <div class="tile-footer">
              <span class="points-label">Points</span>
              <span class="points-value">${team['Points']}</span>
            </div>
          </div>
        </div>`;

      return tile;
    }

    // ── Staggered reveal ──
    function revealTiles(tiles) {
      tiles.forEach((tile, i) => {
        setTimeout(() => {
          const inner = tile.querySelector('.tile-inner');
          if (inner) inner.classList.add('revealed');
        }, i * 220);   // 220ms stagger between each tile
      });
    }

    // ── Main ──
    async function init() {
      const grid = document.getElementById('grid');

      // Render 6 placeholder tiles immediately so spinners show
      const placeholders = Array.from({ length: 6 }, () => {
        const tile = document.createElement('div');
        tile.className = 'tile';
        tile.innerHTML = `
          <div class="tile-inner">
            <div class="tile-back"><div class="spinner-ring"></div></div>
            <div class="tile-front"></div>
          </div>`;
        grid.appendChild(tile);
        return tile;
      });

      try {
        const res = await fetch('teams.csv');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const text = await res.text();
        const rows = parseCSV(text);

        if (rows.length < 6) throw new Error('Not enough teams in CSV');

        const chosen = pickRandom(rows, 6);

        // Replace placeholders with real tiles
        chosen.forEach((team, i) => {
          const realTile = buildTile(team);
          grid.replaceChild(realTile, placeholders[i]);
        });

        // Short delay so browser paints the back-faces, then reveal
        await new Promise(r => setTimeout(r, 120));
        const allTiles = grid.querySelectorAll('.tile');
        revealTiles([...allTiles]);

      } catch (err) {
        grid.innerHTML = `<div class="error-msg" style="grid-column:1/-1">
          ⚠️ Could not load teams.csv — make sure it's in the same folder as index.html.<br>
          <small style="color:#7a8299">${err.message}</small>
        </div>`;
      }
    }

    init();
  </script>
</body>
</html>
